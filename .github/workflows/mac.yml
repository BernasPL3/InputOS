name: Build InputOS

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    env:
      MACOSX_DEPLOYMENT_TARGET: "11.0"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Upgrade pip
        run: |
          python -m pip install --upgrade pip

      - name: Install dependencies
        run: |
          pip install pyinstaller
          pip install PyQt5 pygame numpy

      - name: Build App
        run: |
          pyinstaller \
          --windowed \
          --onedir \
          --name InputOS \
          --target-architecture universal2 \
          App/main.py

      - name: Verify build
        run: |
          ls dist
          ls dist/InputOS.app

      - name: Create Release
        run: |
          mkdir Release
          cp -R dist/InputOS.app Release/

      - name: Create DMG
        run: |
          hdiutil create \
          -volname "InputOS" \
          -srcfolder Release \
          -ov \
          -format UDZO \
          InputOS.dmg

      - name: Upload APP
        uses: actions/upload-artifact@v4
        with:
          name: InputOS-macOS-App
          path: Release/InputOS.app

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: InputOS-macOS-DMG
          path: InputOS.dmg
