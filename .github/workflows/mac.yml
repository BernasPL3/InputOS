name: Build InputOS

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Upgrade pip
        run: |
          python -m pip install --upgrade pip

      - name: Install dependencies
        run: |
          pip install pyinstaller
          pip install PyQt5 pygame opencv-python numpy

      - name: Verify files
        run: |
          ls
          ls App

      - name: Build InputOS
        run: |
          pyinstaller --windowed --onedir App/main.py --name InputOS

      - name: Create Release folder
        run: |
          mkdir Release
          cp -R dist/InputOS.app Release/

      - name: Build DMG
        run: |
          hdiutil create -volname "InputOS" \
          -srcfolder Release \
          -ov \
          -format UDZO \
          InputOS.dmg

      - name: Upload APP
        uses: actions/upload-artifact@v4
        with:
          name: InputOS-app
          path: Release/InputOS.app

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: InputOS-dmg
          path: InputOS.dmg
